services:
  pig-mysql:
    image: ${REGISTRY:-crpi-tm42n24q2axxf8ej.cn-shenzhen.personal.cr.aliyuncs.com/tubuxitong}/pig-mysql:latest
    environment:
      MYSQL_ROOT_HOST: "%"
      MYSQL_ROOT_PASSWORD: root
    restart: always
    container_name: pig-mysql
    ports:
      - 33306:3306
    volumes:
      - ./data/mysql:/var/lib/mysql
    networks:
      - spring_cloud_default

  pig-redis:
    image: registry.cn-hangzhou.aliyuncs.com/dockerhub_mirror/redis
    ports:
      - 36379:6379
    restart: always
    container_name: pig-redis
    hostname: pig-redis
    volumes:
      - ./data/redis:/data
    networks:
      - spring_cloud_default

  pig-register:
    image: ${REGISTRY:-crpi-tm42n24q2axxf8ej.cn-shenzhen.personal.cr.aliyuncs.com/tubuxitong}/pig-register:latest
    restart: always
    ports:
      - 8848:8848
      - 9848:9848
      - 8080:8080
    environment:
      MYSQL_HOST: pig-mysql
      REDIS_HOST: pig-redis
    container_name: pig-register
    hostname: pig-register
    volumes:
      - ./data/nacos:/home/nacos/data
    networks:
      - spring_cloud_default

  pig-gateway:
    image: ${REGISTRY:-crpi-tm42n24q2axxf8ej.cn-shenzhen.personal.cr.aliyuncs.com/tubuxitong}/pig-gateway:latest
    restart: always
    ports:
      - 9999:9999
    container_name: pig-gateway
    hostname: pig-gateway
    environment:
      REDIS_HOST: pig-redis
      NACOS_HOST: pig-register
    networks:
      - spring_cloud_default

  pig-auth:
    image: ${REGISTRY:-crpi-tm42n24q2axxf8ej.cn-shenzhen.personal.cr.aliyuncs.com/tubuxitong}/pig-auth:latest
    restart: always
    container_name: pig-auth
    hostname: pig-auth
    environment:
      REDIS_HOST: pig-redis
      NACOS_HOST: pig-register
    networks:
      - spring_cloud_default

  pig-upms:
    image: ${REGISTRY:-crpi-tm42n24q2axxf8ej.cn-shenzhen.personal.cr.aliyuncs.com/tubuxitong}/pig-upms:latest
    restart: always
    container_name: pig-upms
    hostname: pig-upms
    environment:
      MYSQL_HOST: pig-mysql
      REDIS_HOST: pig-redis
      NACOS_HOST: pig-register
    networks:
      - spring_cloud_default

networks:
  spring_cloud_default:
    name: spring_cloud_default
    driver: bridge
