# This workflow will build a Java project with Maven
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven

name: Docker 镜像 构建

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: [ 17 ]
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'zulu'

      - name: mvn clean install
        run: mvn clean install -Pcloud

      - name: Login to Docker Registry
        run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }} crpi-tm42n24q2axxf8ej.cn-shenzhen.personal.cr.aliyuncs.com

      - name: Build and push Docker images
        env:
          COMPOSE_PROJECT_NAME: pig
        run: |
          docker compose -p pig -f docker-compose.yml build
          registry="crpi-tm42n24q2axxf8ej.cn-shenzhen.personal.cr.aliyuncs.com/tubuxitong/"
          docker tag pig-register:latest ${registry}tubuxingzou:latest
          docker tag pig-upms:latest ${registry}pig-upms:latest
          docker push ${registry}tubuxingzou:latest
          docker push ${registry}pig-upms:latest
